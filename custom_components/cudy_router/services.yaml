send_sms:
  name: Send SMS
  description: Send an SMS using the router's SMS functionality.
  fields:
    phone_number:
      name: Phone number
      description: Destination phone number including country code (e.g. +441234567890)
      required: true
      example: "+441234567890"
      selector:
        text:
    message:
      name: Message
      description: Text message to send
      required: true
      example: "Hello from Home Assistant"
      selector:
        text:
          multiline: true
    entry_id:
      name: Config entry ID
      description: Optional config entry id to target a specific router instance
      required: false
      example: "abcd1234"
      selector:
        text:

reboot_router:
  name: Reboot router
  description: Reboot the router via the LuCI web UI.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional config entry id to target a specific router instance
      required: false
      example: "abcd1234"
      selector:
        text:

restart_5g_connection:
  name: Restart 5G connection
  description: Restart the router's 5G modem/connection.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional config entry id to target a specific router instance
      required: false
      example: "abcd1234"
      selector:
        text:

switch_5g_band:
  name: Switch 5G band
  description: Change the 5G band setting on the router.
  fields:
    band:
      name: Band
      description: Band value to select (depends on router)
      required: true
      example: "B3"
      selector:
        text:
    entry_id:
      name: Config entry ID
      description: Optional config entry id to target a specific router instance
      required: false
      example: "abcd1234"
      selector:
        text:

set_cellular_bands:
  name: Set cellular bands
  description: Enable cellular band selection and choose LTE and 5G SA bands when the router firmware exposes them.
  fields:
    lte_bands:
      name: LTE bands
      description: LTE bands to allow.
      required: false
      example: ["B3", "B7", "B20"]
      selector:
        select:
          multiple: true
          options:
            - "B1"
            - "B3"
            - "B5"
            - "B7"
            - "B8"
            - "B20"
            - "B28"
            - "B32"
            - "B38"
            - "B40"
            - "B41"
            - "B42"
            - "B43"
    nr5g_bands:
      name: 5G SA bands
      description: 5G SA bands to allow.
      required: false
      example: ["n28", "n78"]
      selector:
        select:
          multiple: true
          options:
            - "n1"
            - "n3"
            - "n5"
            - "n7"
            - "n8"
            - "n20"
            - "n28"
            - "n38"
            - "n40"
            - "n41"
            - "n71"
            - "n75"
            - "n76"
            - "n77"
            - "n78"
    enable_band_select:
      name: Enable band select
      description: Turn the router's Band Select switch on or off.
      required: false
      default: true
      selector:
        boolean:
    entry_id:
      name: Config entry ID
      description: Optional config entry id to target a specific router instance
      required: false
      example: "abcd1234"
      selector:
        text:

send_at_command:
  name: Send AT command
  description: Send an AT command to the modem via the router's web UI. The result will be logged.
  fields:
    command:
      name: AT Command
      description: The AT command to send (e.g. AT+CSQ)
      required: true
      example: "AT+CSQ"
      selector:
        text:
    entry_id:
      name: Config entry ID
      description: Optional config entry id to target a specific router instance
      required: false
      example: "abcd1234"
      selector:
        text:

generate_debug_report:
  name: Generate debug report
  description: Create a redacted Cudy Router debug report for troubleshooting WAN and VPN entity issues.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional config entry id to target a specific router instance
      required: false
      example: "abcd1234"
      selector:
        text:
    include_html:
      name: Include HTML
      description: Include redacted HTML snippets from each tested router page.
      required: false
      default: true
      selector:
        boolean:
    max_html_chars:
      name: Maximum HTML characters
      description: Maximum redacted HTML characters to include for each tested router page.
      required: false
      default: 3000
      selector:
        number:
          min: 0
          max: 20000
          mode: box
